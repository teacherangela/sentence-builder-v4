<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Teacher Angela's Sentence Builder!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-main: #1a1a2e; 
            --p1-color: #ff5252; --p2-color: #448aff; --p3-color: #69f0ae;
            --accent: #FF9800; --text-light: #ffffff; --shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; 
            background: var(--bg-main); color: var(--text-light); 
            overflow: hidden; touch-action: none; 
            -webkit-user-select: none; user-select: none;
            width: 100vw; height: 100vh;
        }

        .screen { display: none; position: absolute; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: background 0.5s ease; }
        
        .main-title {
            font-size: 85px; text-align: center; margin-bottom: 30px; color: white;
            text-shadow: 4px 4px 0px var(--accent), 8px 8px 20px rgba(0,0,0,0.6);
            line-height: 0.9; font-weight: 700;
        }

        #intro-screen { 
            display: flex; 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('background.gif') center/cover; 
        }
        
        #game-boundary { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 5; touch-action: none; }
        
        .player-lane { 
            position: relative; height: 100%; flex: 1; 
            border-right: 2px dashed rgba(255,255,255,0.2); 
            display: flex; flex-direction: column; overflow: hidden;
            background-size: cover; background-position: center;
            transition: opacity 0.3s, filter 0.3s, background-image 0.5s ease;
            touch-action: none;
        }
        .player-lane.frozen { opacity: 0.5; filter: grayscale(0.8); pointer-events: none !important; }

        .lane-header {
            background: rgba(0,0,0,0.7); padding: 10px; padding-top: 80px; 
            text-align: center; z-index: 30; pointer-events: none;
        }
        .lane-name { font-weight: 700; font-size: 22px; color: #fff; margin: 0; text-transform: uppercase; }
        .lane-stats { display: flex; justify-content: space-around; font-size: 16px; margin-top: 5px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); }

        .sentence-dock {
            position: absolute; bottom: 0; width: 100%; height: auto; min-height: 180px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(5px);
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 10px; padding: 20px; box-sizing: border-box; border-top: 4px solid transparent; z-index: 20;
        }
        .p1-dock { border-color: var(--p1-color); }
        .p2-dock { border-color: var(--p2-color); }
        .p3-dock { border-color: var(--p3-color); }

        .word-slot {
            min-width: 80px; height: 50px; border: 3px dashed #666;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; color: #444; padding: 0 15px;
            background: rgba(0,0,0,0.05);
        }
        .word-slot.size-2 { min-width: 110px; height: 65px; font-size: 36px; }
        .word-slot.size-1 { min-width: 150px; height: 90px; font-size: 50px; }
        
        .word-slot.filled { border: 3px solid #222; color: #000; background: white; }

        .word-card {
            position: absolute; padding: 15px 25px; background: white; color: #111;
            border-radius: 15px; box-shadow: var(--shadow); font-weight: bold; 
            cursor: grab; touch-action: none; z-index: 100; font-size: 28px;
            user-select: none; white-space: nowrap; will-change: transform;
            border: 2px solid #ccc;
        }
        .word-card.size-2 { padding: 20px 35px; font-size: 36px; }
        .word-card.size-1 { padding: 25px 45px; font-size: 50px; border-radius: 20px; }

        .ui-layer { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 5000; pointer-events: none; }
        .ui-layer button, .top-btns { pointer-events: auto; }
        
        .top-btns { display: flex; gap: 15px; align-items: center; }

        #settings-modal { display: none; position: fixed; z-index: 6000; inset: 0; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 20px; }
        .modal-content { background: #fff; color: #333; margin: auto; padding: 30px; border-radius: 20px; max-width: 750px; position: relative; }
        
        .close-x {
            position: absolute; top: 15px; right: 20px; font-size: 30px; font-weight: bold;
            cursor: pointer; color: #999; transition: 0.2s; line-height: 1;
        }
        .close-x:hover { color: #333; }

        .btn { padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin: 5px; background: #eee; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; font-family: 'Fredoka'; }
        .btn:active { transform: scale(0.95); }
        .toggle-btn { flex: 1; padding: 12px; border: 2px solid #ccc; border-radius: 10px; cursor: pointer; text-align: center; font-weight: bold; }
        .toggle-btn.active { border-color: var(--accent); background: #fff3e0; color: var(--accent); }
        
        .setting-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .setting-group p { font-weight: bold; margin-bottom: 8px; }
        .input-field { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-family: 'Fredoka'; margin-top: 5px;}
        
        .round-btn { width: 50px; height: 50px; border-radius: 50%; background: white; border: none; font-size: 24px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; }
        .bg-preview { width: 40px; height: 40px; border-radius: 5px; border: 1px solid #ccc; background-size: cover; background-position: center; margin-left: 10px; flex-shrink: 0; }

        .lane-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center;
            font-size: 40px; font-weight: bold; color: #69f0ae; z-index: 1000;
            text-align: center; padding: 20px;
        }

        #result-screen { background: rgba(0,0,0,0.95); z-index: 7000; text-align: center; }

        .sentence-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #f5f5f5; padding: 10px; border-radius: 10px; }
        .sentence-row .input-field { margin-top: 0; }
        .sentence-row .bg-preview { width: 50px; height: 50px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="bg-music" loop src="background.mp3"></audio>
    <audio id="sfx-correct" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>
    <audio id="sfx-wrong" src="https://assets.mixkit.co/active_storage/sfx/408/408-preview.mp3"></audio>

    <div id="intro-screen" class="screen">
        <h1 class="main-title">Teacher Angela's<br>Sentence Builder!</h1>
        <div style="display:flex; gap:15px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" style="background:#66bb6a; color:white; font-size:28px; padding: 15px 40px;" onclick="saveAndStart()">START GAME ▶</button>
            <button class="btn" style="font-size: 20px;" onclick="openSettings()">SETTINGS ⚙</button>
        </div>
        <div class="top-btns" style="position:fixed; top:20px; right:20px;">
            <button class="round-btn" onclick="toggleMusic()" id="music-btn-start">🔊</button>
            <button class="round-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="ui-layer">
            <button class="btn" onclick="goBackToStart()" style="background: rgba(255,255,255,0.9); color: #333; box-shadow: var(--shadow); font-size: 18px;">⬅ BACK</button>
            <div class="top-btns">
                <button class="round-btn" onclick="toggleMusic()" id="music-btn-game">🔊</button>
                <button class="round-btn" onclick="toggleFullscreen()">⛶</button>
            </div>
        </div>
        <div id="game-boundary"></div>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="winner-announcement" style="font-size: 50px; color: var(--accent);"></h1>
        <div id="final-scores" style="font-size: 24px; margin-bottom: 30px;"></div>
        <button class="btn" style="background:#66bb6a; color:white; font-size:24px; padding: 20px 40px;" onclick="goBackToStart()">PLAY AGAIN</button>
    </div>

    <div id="settings-modal">
        <div class="modal-content">
            <span class="close-x" onclick="closeSettings()">&times;</span>
            <h2 style="margin-top:0; color: var(--accent);">Game Settings</h2>
            
            <div class="setting-group" style="background: #f9f9f9; padding: 15px; border-radius: 12px; border-bottom: 2px solid #eee;">
                <div style="display: flex; align-items:center; justify-content: space-between; margin-bottom: 10px;">
                    <p style="margin:0;">Import Sync:</p>
                    <div style="display: flex; gap: 5px; width: 140px;">
                        <div class="toggle-btn" id="sync-on" onclick="toggleSync(true)" style="padding: 8px;">ON</div>
                        <div class="toggle-btn" id="sync-off" onclick="toggleSync(false)" style="padding: 8px;">OFF</div>
                    </div>
                </div>
                <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;">
                    <button class="btn" onclick="exportData()" style="padding: 8px 15px; font-size: 14px;">💾 EXPORT</button>
                    <button class="btn" onclick="document.getElementById('import-file').click()" style="padding: 8px 15px; font-size: 14px;">📁 IMPORT</button>
                    <button class="btn" onclick="resetToDefaults()" style="color: #ff5252; padding: 8px 15px; font-size: 14px;">♻ RESET ALL</button>
                    <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(this)">
                </div>
            </div>

            <div class="setting-group" style="margin-top: 15px;">
                <p>Main Start Page Background:</p>
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="flex:1;">
                        <input type="text" id="main-bg-url" placeholder="Paste URL or image..." class="input-field" onchange="updateMainBg(this.value)">
                    </div>
                    <div class="bg-preview" id="main-bg-preview"></div>
                </div>
                <div style="display:flex; align-items:center; margin-top:10px;">
                    <button class="btn" onclick="document.getElementById('main-bg-file').click()" style="margin:0; flex:1;">Upload File</button>
                    <input type="file" id="main-bg-file" style="display:none" accept="image/*" onchange="handleMainBgUpload(this)">
                </div>
            </div>

            <div class="setting-group">
                <p>Number of Players:</p>
                <div style="display: flex; gap: 10px;">
                    <div class="toggle-btn" id="p-1" onclick="setPlayers(1)">1</div>
                    <div class="toggle-btn" id="p-2" onclick="setPlayers(2)">2</div>
                    <div class="toggle-btn" id="p-3" onclick="setPlayers(3)">3</div>
                </div>
            </div>

            <div id="player-customization"></div>

            <div class="setting-group">
                <p>Bouncing Speed (Level 1-5):</p>
                <div style="display: flex; gap: 5px;">
                    <div class="toggle-btn speed-btn" id="s-1" onclick="setSpeed(1)">1</div>
                    <div class="toggle-btn speed-btn" id="s-2" onclick="setSpeed(2)">2</div>
                    <div class="toggle-btn speed-btn" id="s-3" onclick="setSpeed(3)">3</div>
                    <div class="toggle-btn speed-btn" id="s-4" onclick="setSpeed(4)">4</div>
                    <div class="toggle-btn speed-btn" id="s-5" onclick="setSpeed(5)">5</div>
                </div>
            </div>

            <div class="setting-group">
                <p>Game Timer (seconds):</p>
                <input type="number" id="timer-input" value="60" class="input-field">
            </div>

            <div class="setting-group">
                <p>Sentence Bank & Level Backgrounds:</p>
                <div id="sentence-container"></div>
                <button class="btn" onclick="addSentenceRow()" style="width: 100%; margin-top: 10px; background: #e3f2fd; color: #1976d2;">+ ADD SENTENCE</button>
            </div>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="applySettingsOnly()" style="flex: 1; background: #eee;">💾 SAVE SETTINGS</button>
                <button class="btn" onclick="saveAndStart()" style="flex: 2; background: var(--accent); color: white;">▶ PLAY NOW</button>
            </div>
        </div>
    </div>

    <script>
        let playerCount = 1;
        let gameSpeedLevel = 2;
        let baseTimer = 60;
        let musicPlaying = false;
        let importSync = true;
        let mainBg = localStorage.getItem('teacherAngela_mainBg') || 'background.gif';
        
        let sentenceBank = [
            { text: "The quick brown fox", bg: "" },
            { text: "I love learning English", bg: "" },
            { text: "Apples are delicious", bg: "" }
        ];
        
        let playerConfigs = [
            { name: "Player 1", bg: "background1.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 },
            { name: "Player 2", bg: "background2.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 },
            { name: "Player 3", bg: "background3.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 }
        ];

        let activeSentences = [];
        let globalTimer = 60;
        let timerInterval;
        let physicsRequest;
        let wordsInPlay = [];

        window.onload = () => {
            updateMainBg(mainBg);
            setPlayers(1);
            setSpeed(2);
            toggleSync(true);
            setupPasteDetection();
            renderSentenceBank();

            // Prevention of accidental browser gestures (closing/dragging)
            document.addEventListener('touchmove', function(e) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                }
            }, { passive: false });
        };

        function resetToDefaults() {
            if(confirm("Reset all settings, images, and sentences to default?")) {
                localStorage.removeItem('teacherAngela_mainBg');
                mainBg = 'background.gif';
                sentenceBank = [{ text: "The quick brown fox", bg: "" }, { text: "I love learning English", bg: "" }, { text: "Apples are delicious", bg: "" }];
                playerCount = 1;
                gameSpeedLevel = 2;
                baseTimer = 60;
                playerConfigs = [
                    { name: "Player 1", bg: "background1.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 },
                    { name: "Player 2", bg: "background2.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 },
                    { name: "Player 3", bg: "background3.gif", score: 0, currentSentenceIdx: 0, finished: false, frozen: false, timeFinished: 0 }
                ];
                updateMainBg(mainBg);
                setPlayers(1);
                setSpeed(2);
                renderSentenceBank();
                document.getElementById('timer-input').value = baseTimer;
                alert("Settings reset to defaults!");
            }
        }

        function toggleSync(val) {
            importSync = val;
            document.getElementById('sync-on').classList.toggle('active', val);
            document.getElementById('sync-off').classList.toggle('active', !val);
        }

        function setupPasteDetection() {
            window.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let index in items) {
                    const item = items[index];
                    if (item.kind === 'file' && item.type.includes('image')) {
                        const blob = item.getAsFile();
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const dataUrl = event.target.result;
                            const activeEl = document.activeElement;
                            if (activeEl && activeEl.id.startsWith('sent-txt-')) {
                                const sIdx = parseInt(activeEl.id.split('-').pop());
                                sentenceBank[sIdx].bg = dataUrl;
                                document.getElementById(`sent-prev-${sIdx}`).style.backgroundImage = `url(${dataUrl})`;
                                e.preventDefault();
                            } else if (activeEl && activeEl.id.startsWith('name-in-')) {
                                const pIdx = parseInt(activeEl.id.split('-').pop());
                                playerConfigs[pIdx].bg = dataUrl;
                                document.getElementById(`preview-${pIdx}`).style.backgroundImage = `url(${dataUrl})`;
                                e.preventDefault();
                            } else if (activeEl && activeEl.id === 'main-bg-url') {
                                updateMainBg(dataUrl);
                                e.preventDefault();
                            }
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            });
        }

        function renderSentenceBank() {
            const container = document.getElementById('sentence-container');
            container.innerHTML = '';
            sentenceBank.forEach((item, i) => {
                const row = document.createElement('div');
                row.className = 'sentence-row';
                row.innerHTML = `
                    <span style="font-weight:bold; color:#666;">${i+1}</span>
                    <input type="text" id="sent-txt-${i}" class="input-field" value="${item.text}" placeholder="Type sentence here..." oninput="sentenceBank[${i}].text = this.value">
                    <div class="bg-preview" id="sent-prev-${i}" style="background-image: url(${item.bg || ''})"></div>
                    <button class="btn" onclick="document.getElementById('sent-file-${i}').click()" style="padding: 5px 10px; font-size: 12px; margin:0;">Upload</button>
                    <input type="file" id="sent-file-${i}" style="display:none" accept="image/*" onchange="handleSentenceBgUpload(${i}, this)">
                    <button class="btn" onclick="removeSentenceRow(${i})" style="color:red; padding: 5px 10px; font-size: 12px; margin:0;">✖</button>
                `;
                container.appendChild(row);
            });
        }

        function addSentenceRow() { sentenceBank.push({ text: "", bg: "" }); renderSentenceBank(); }
        function removeSentenceRow(idx) { sentenceBank.splice(idx, 1); renderSentenceBank(); }
        function handleSentenceBgUpload(idx, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    sentenceBank[idx].bg = e.target.result;
                    document.getElementById(`sent-prev-${idx}`).style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        }

        function updateMainBg(url) {
            if(!url) return;
            mainBg = url;
            localStorage.setItem('teacherAngela_mainBg', url);
            document.getElementById('intro-screen').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${url}')`;
            document.getElementById('main-bg-preview').style.backgroundImage = `url('${url}')`;
            document.getElementById('main-bg-url').value = (url.startsWith('data:') || url.includes('.gif')) && !url.startsWith('http') ? '' : url;
        }

        function handleMainBgUpload(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => updateMainBg(e.target.result);
                reader.readAsDataURL(file);
            }
        }

        function toggleMusic() {
            const bgm = document.getElementById('bg-music');
            const btns = [document.getElementById('music-btn-start'), document.getElementById('music-btn-game')];
            if (bgm.paused) {
                bgm.play().catch(e => console.log("Interaction required"));
                musicPlaying = true;
                btns.forEach(b => b.innerText = "🔊");
            } else {
                bgm.pause();
                musicPlaying = false;
                btns.forEach(b => b.innerText = "🔇");
            }
        }

        function setPlayers(n) {
            playerCount = n;
            document.querySelectorAll('[id^="p-"]').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`p-${n}`);
            if(activeBtn) activeBtn.classList.add('active');
            renderPlayerSettings();
        }

        function renderPlayerSettings() {
            const container = document.getElementById('player-customization');
            container.innerHTML = '';
            for(let i=0; i < playerCount; i++) {
                const group = document.createElement('div');
                group.className = 'setting-group';
                group.innerHTML = `
                    <p>Player ${i+1} Name & Starting Background:</p>
                    <div style="display:flex; flex-direction:column; gap:10px;">
                        <input type="text" placeholder="Name or paste image" class="input-field" id="name-in-${i}" value="${playerConfigs[i].name}">
                        <div style="display:flex; align-items:center;">
                            <button class="btn" onclick="document.getElementById('bg-file-${i}').click()" style="margin:0; flex:1;">Upload File</button>
                            <input type="file" id="bg-file-${i}" style="display:none" accept="image/*" onchange="handleImageUpload(${i}, this)">
                            <div class="bg-preview" id="preview-${i}" style="background-image: url(${playerConfigs[i].bg})"></div>
                        </div>
                    </div>
                `;
                container.appendChild(group);
            }
        }

        function handleImageUpload(idx, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    playerConfigs[idx].bg = e.target.result;
                    const preview = document.getElementById(`preview-${idx}`);
                    if(preview) preview.style.backgroundImage = `url(${e.target.result})`;
                };
                reader.readAsDataURL(file);
            }
        }

        function setSpeed(n) {
            gameSpeedLevel = n;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`s-${n}`).classList.add('active');
        }

        function openSettings() {
            baseTimer = parseInt(document.getElementById('timer-input').value) || 60;
            renderSentenceBank();
            setPlayers(playerCount);
            setSpeed(gameSpeedLevel);
            document.getElementById('settings-modal').style.display = 'block';
        }

        function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

        function applySettingsOnly() {
            baseTimer = parseInt(document.getElementById('timer-input').value) || 60;
            for(let i=0; i < playerCount; i++) {
                const nameIn = document.getElementById(`name-in-${i}`);
                if(nameIn) playerConfigs[i].name = nameIn.value || `Player ${i+1}`;
            }
            closeSettings();
        }

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
            } else {
                cancelFullScreen.call(doc);
            }
        }

        function saveAndStart() {
            applySettingsOnly();
            for(let i=0; i < 3; i++) {
                playerConfigs[i].score = 0; playerConfigs[i].finished = false; playerConfigs[i].frozen = false;
                playerConfigs[i].currentSentenceIdx = 0; playerConfigs[i].timeFinished = 0;
            }
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initGame();
        }

        function initGame() {
            const boundary = document.getElementById('game-boundary');
            boundary.innerHTML = '';
            activeSentences = [];
            wordsInPlay = [];
            globalTimer = baseTimer;

            for(let i = 0; i < playerCount; i++) {
                const lane = document.createElement('div');
                lane.className = `player-lane p${i+1}-lane`;
                lane.id = `lane-${i}`;
                if(playerConfigs[i].bg) lane.style.backgroundImage = `url('${playerConfigs[i].bg}')`;
                
                lane.innerHTML = `
                    <div class="lane-header">
                        <div class="lane-name">${playerConfigs[i].name}</div>
                        <div class="lane-stats">
                            <div class="stat-box">Score: <span id="score-${i}">0</span></div>
                            <div class="stat-box">Time: <span id="time-${i}">${globalTimer}s</span></div>
                        </div>
                    </div>
                    <div class="lane-overlay" id="overlay-${i}">WELL DONE!</div>
                    <div class="sentence-dock p${i+1}-dock" id="dock-${i}"></div>
                `;
                boundary.appendChild(lane);
                setupPlayerSentence(i);
            }
            startTimer();
            if(physicsRequest) cancelAnimationFrame(physicsRequest);
            physicsRequest = requestAnimationFrame(updatePhysics);
        }

        function setupPlayerSentence(pIdx) {
            const sIdx = playerConfigs[pIdx].currentSentenceIdx;
            if (sIdx >= sentenceBank.length) {
                playerConfigs[pIdx].finished = true;
                playerConfigs[pIdx].timeFinished = globalTimer; 
                const overlay = document.getElementById(`overlay-${pIdx}`);
                if(overlay) overlay.style.display = 'flex';
                checkIfAllFinished();
                return;
            }

            const sentenceObj = sentenceBank[sIdx];
            const words = sentenceObj.text.split(" ");
            const dock = document.getElementById(`dock-${pIdx}`);
            const lane = document.getElementById(`lane-${pIdx}`);
            if(!dock || !lane) return;

            if(sentenceObj.bg) lane.style.backgroundImage = `url('${sentenceObj.bg}')`;

            dock.innerHTML = '';
            activeSentences[pIdx] = { words: words, currentWordIdx: 0 };

            let sizeSuffix = playerCount === 1 ? ' size-1' : (playerCount === 2 ? ' size-2' : '');

            words.forEach((w, i) => {
                const slot = document.createElement('div');
                slot.className = 'word-slot' + sizeSuffix;
                slot.id = `slot-${pIdx}-${i}`;
                slot.innerText = "?";
                dock.appendChild(slot);
            });

            const speedMult = gameSpeedLevel * 0.8;
            words.forEach(word => {
                const card = document.createElement('div');
                card.className = 'word-card' + sizeSuffix;
                card.innerText = word;
                lane.appendChild(card);

                setTimeout(() => {
                    const wordObj = {
                        el: card, pIdx: pIdx,
                        x: Math.random() * (lane.offsetWidth - card.offsetWidth),
                        y: 180 + Math.random() * (lane.offsetHeight - 450),
                        vx: (Math.random() - 0.5) * 5 * speedMult,
                        vy: (Math.random() - 0.5) * 5 * speedMult,
                        isDragging: false, pointerId: null,
                        width: card.offsetWidth, height: card.offsetHeight
                    };
                    wordsInPlay.push(wordObj);
                    attachPointerEvents(wordObj);
                }, 10);
            });
        }

        function updatePhysics() {
            wordsInPlay.forEach(w => {
                if (!w.isDragging) {
                    const lane = document.getElementById(`lane-${w.pIdx}`);
                    if(!lane) return;
                    w.x += w.vx; w.y += w.vy;
                    if (w.x <= 0) { w.x = 0; w.vx *= -1; }
                    if (w.x + w.width >= lane.offsetWidth) { w.x = lane.offsetWidth - w.width; w.vx *= -1; }
                    if (w.y <= 160) { w.y = 160; w.vy *= -1; }
                    if (w.y + w.height >= lane.offsetHeight - 180) { w.y = lane.offsetHeight - 180 - w.height; w.vy *= -1; }
                    w.el.style.transform = `translate(${w.x}px, ${w.y}px)`;
                }
            });
            physicsRequest = requestAnimationFrame(updatePhysics);
        }

        function attachPointerEvents(wObj) {
            const el = wObj.el;
            const lane = document.getElementById(`lane-${wObj.pIdx}`);
            el.addEventListener('pointerdown', (e) => {
                if(playerConfigs[wObj.pIdx].finished || playerConfigs[wObj.pIdx].frozen) return;
                wObj.isDragging = true;
                wObj.pointerId = e.pointerId;
                el.setPointerCapture(e.pointerId);
                const rect = el.getBoundingClientRect();
                wObj.offsetX = e.clientX - rect.left;
                wObj.offsetY = e.clientY - rect.top;
                el.style.zIndex = 1000;
            });
            el.addEventListener('pointermove', (e) => {
                if (wObj.isDragging && e.pointerId === wObj.pointerId) {
                    const laneRect = lane.getBoundingClientRect();
                    wObj.x = e.clientX - laneRect.left - wObj.offsetX;
                    wObj.y = e.clientY - laneRect.top - wObj.offsetY;
                    el.style.transform = `translate(${wObj.x}px, ${wObj.y}px)`;
                    e.preventDefault(); // Stop screen dragging
                }
            });
            const stopDrag = (e) => {
                if (wObj.isDragging && e.pointerId === wObj.pointerId) {
                    wObj.isDragging = false;
                    wObj.pointerId = null;
                    el.releasePointerCapture(e.pointerId);
                    el.style.zIndex = 100;
                    checkDrop(wObj);
                }
            };
            el.addEventListener('pointerup', stopDrag);
            el.addEventListener('pointercancel', stopDrag);
        }

        function checkDrop(wObj) {
            const pIdx = wObj.pIdx;
            const state = activeSentences[pIdx];
            const targetWord = state.words[state.currentWordIdx];
            const slot = document.getElementById(`slot-${pIdx}-${state.currentWordIdx}`);
            if(!slot) return;
            const sRect = slot.getBoundingClientRect();
            const wRect = wObj.el.getBoundingClientRect();
            const isOver = !(wRect.right < sRect.left || wRect.left > sRect.right || wRect.bottom < sRect.top || wRect.top > sRect.bottom);
            
            if (isOver) {
                if (wObj.el.innerText === targetWord) {
                    document.getElementById('sfx-correct').play();
                    slot.innerText = targetWord; slot.classList.add('filled');
                    wObj.el.remove();
                    wordsInPlay = wordsInPlay.filter(item => item !== wObj);
                    state.currentWordIdx++;
                    playerConfigs[pIdx].score += 10;
                    updateScoreUI(pIdx);
                    if (state.currentWordIdx === state.words.length) {
                        playerConfigs[pIdx].currentSentenceIdx++;
                        setTimeout(() => {
                            wordsInPlay.filter(w => w.pIdx === pIdx).forEach(w => w.el.remove());
                            wordsInPlay = wordsInPlay.filter(w => w.pIdx !== pIdx);
                            setupPlayerSentence(pIdx);
                        }, 500);
                    }
                } else {
                    document.getElementById('sfx-wrong').play(); 
                    playerConfigs[pIdx].score = Math.max(0, playerConfigs[pIdx].score - 5);
                    updateScoreUI(pIdx);
                    const laneEl = document.getElementById(`lane-${pIdx}`);
                    playerConfigs[pIdx].frozen = true;
                    laneEl.classList.add('frozen');
                    setTimeout(() => { playerConfigs[pIdx].frozen = false; laneEl.classList.remove('frozen'); }, 2000);
                }
            }
        }

        function updateScoreUI(pIdx) {
            const scoreEl = document.getElementById(`score-${pIdx}`);
            if(scoreEl) scoreEl.innerText = playerConfigs[pIdx].score;
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                globalTimer--;
                for(let i=0; i<playerCount; i++){
                    const el = document.getElementById(`time-${i}`);
                    if(el) el.innerText = globalTimer + "s";
                }
                if(globalTimer <= 0) endGame();
            }, 1000);
        }

        function checkIfAllFinished() {
            const activeOnes = playerConfigs.slice(0, playerCount);
            if(activeOnes.every(p => p.finished)) endGame();
        }

        function endGame() {
            clearInterval(timerInterval);
            cancelAnimationFrame(physicsRequest);
            const activePlayers = playerConfigs.slice(0, playerCount).sort((a, b) => b.score - a.score || b.timeFinished - a.timeFinished);
            const winner = activePlayers[0];
            document.getElementById('winner-announcement').innerText = `${winner.name} WINS!`;
            document.getElementById('final-scores').innerHTML = activePlayers.map(p => `<p>${p.name}: ${p.score} pts</p>`).join('');
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
        }

        function goBackToStart() {
            clearInterval(timerInterval);
            cancelAnimationFrame(physicsRequest);
            document.getElementById('game-boundary').innerHTML = '';
            wordsInPlay = [];
            for(let i=0; i < playerConfigs.length; i++) {
                playerConfigs[i].score = 0; playerConfigs[i].finished = false; playerConfigs[i].frozen = false; playerConfigs[i].currentSentenceIdx = 0; playerConfigs[i].timeFinished = 0;
            }
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('settings-modal').style.display = 'none';
            document.getElementById('intro-screen').style.display = 'flex';
        }

        function exportData() {
            baseTimer = parseInt(document.getElementById('timer-input').value) || 60;
            for(let i=0; i < playerCount; i++) {
                const nameIn = document.getElementById(`name-in-${i}`);
                if(nameIn) playerConfigs[i].name = nameIn.value || `Player ${i+1}`;
            }
            const data = { bank: sentenceBank, players: playerCount, speed: gameSpeedLevel, timer: baseTimer, configs: playerConfigs, mainBg: mainBg };
            const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "SentenceRaceConfig.json"; a.click();
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (importSync) {
                        if(data.bank) sentenceBank = data.bank;
                        if(data.players) playerCount = data.players;
                        if(data.speed) gameSpeedLevel = data.speed;
                        if(data.timer) baseTimer = data.timer;
                        if(data.mainBg) updateMainBg(data.mainBg);
                        if(data.configs) playerConfigs = data.configs;
                        document.getElementById('timer-input').value = baseTimer;
                        setPlayers(playerCount); setSpeed(gameSpeedLevel); renderSentenceBank();
                        alert("Settings Imported and Synced!");
                    } else {
                        if(data.bank) { sentenceBank = data.bank; renderSentenceBank(); }
                        if(data.timer) document.getElementById('timer-input').value = data.timer;
                        if(data.players) setPlayers(data.players);
                        if(data.speed) setSpeed(data.speed);
                        alert("Settings loaded. Click 'Save' or 'Play' to apply.");
                    }
                } catch(err) { alert("Invalid File Format"); }
            };
            reader.readAsText(file);
        }
    </script>
</body>
